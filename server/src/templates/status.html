<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pra Frente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #F3F4F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #FFFFFF;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 28px; }
    h1 { font-size: 22px; margin-bottom: 14px; color: {{cor_titulo}}; }
    p { color: #6B7280; font-size: 16px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.png" alt="Pra Frente" class="logo" />
    <h1>{{titulo}}</h1>
    <p>{{mensagem}}</p>
  </div>
</body>
</html>
